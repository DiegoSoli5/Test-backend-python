name: Build and Deploy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    environment:
      name: Testing
    env:
      DATABASE_HOSTNAME: ${{ secrets.DATABASE_HOSTNAME }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
      
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: ${{ secrets.DATABASE_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    runs-on: ubuntu-latest
    steps:
      # check in github marketplace for actions
      - name: Checkout code
        uses: actions/checkout@v2
      - name: install python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'
      - name: update pip
        run: |
          python -m pip install --upgrade pip
      - name: install dependencies
        run: |
          pip install -r requirements.txt
      - name: run tests
        run: |
          pip install pytest
          pip install httpx
          pytest
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      
      # - name: Set up Docker Buildx
      #   uses: docker/setup-buildx-action@v4
      
      # - name: Build and push
      #   uses: docker/build-push-action@v7
      #   with:
      #     push: true
      #     tags: ${{ secrets.DOCKER_USERNAME }}/socialmedia-fastapi:latest
      #     cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/socialmedia-fastapi:buildcache
      #     cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/socialmedia-fastapi:buildcache,mode=max

  deploy:
    environment:
      name: production
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }} # Usando contraseña
          script: |
            cd app/src
            git pull origin main
            sudo systemctl restart api